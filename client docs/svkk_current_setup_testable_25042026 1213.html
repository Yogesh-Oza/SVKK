<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SVKK Mediclaim Current Setup Testable HTML</title>
  <style>
    :root{--bg:#f3f4f6;--card:#fff;--line:#d1d5db;--text:#0f172a;--muted:#475569;--dark:#0f172a;--soft:#f8fafc;--ok:#ecfdf5;--warn:#fffbeb;}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1600px;margin:0 auto;padding:18px}
    .card{background:var(--card);border:1px solid #e5e7eb;border-radius:24px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .header{padding:22px}
    .pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;padding:8px 14px;background:#fff;font-size:12px;font-weight:700}
    .grid{display:grid;gap:14px}
    .stats{grid-template-columns:repeat(4,minmax(0,1fr))}
    .tabs{grid-template-columns:repeat(6,minmax(0,1fr))}
    .stat{padding:16px;border-radius:22px;border:1px solid #e5e7eb;background:#fff}
    .stat.dark{background:var(--dark);color:#fff;border-color:var(--dark)}
    .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.15em;font-weight:700;color:#64748b}
    .stat.dark .k{color:#cbd5e1}
    .stat .v{font-size:30px;font-weight:800;margin-top:8px;word-break:break-word}
    .tab{padding:18px;border-radius:24px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;text-align:left}
    .tab.active{background:var(--dark);color:#fff;border-color:var(--dark)}
    .tab .l{font-size:18px;font-weight:800}
    .tab .s{font-size:13px;margin-top:8px;color:#64748b}
    .tab.active .s{color:#cbd5e1}
    .section{overflow:hidden}
    .section-h{padding:16px 20px;border-bottom:1px solid #e5e7eb;background:var(--soft);display:flex;justify-content:space-between;align-items:center;gap:12px}
    .section-b{padding:18px}
    .badge{padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:12px;font-weight:800}
    .notice{padding:12px 14px;border-radius:18px;border:1px solid #86efac;background:var(--ok);color:#166534;font-size:14px;font-weight:600}
    .warn{padding:12px 14px;border-radius:18px;border:1px solid #fcd34d;background:var(--warn);color:#92400e;font-size:14px;font-weight:600}
    .row4{display:grid;gap:14px;grid-template-columns:repeat(4,minmax(0,1fr))}
    .row5{display:grid;gap:14px;grid-template-columns:repeat(5,minmax(0,1fr))}
    .row6{display:grid;gap:14px;grid-template-columns:repeat(6,minmax(0,1fr))}
    .field{display:grid;gap:8px}
    .field label{font-size:13px;font-weight:700;color:#334155}
    .field input,.field select,.field textarea{min-height:42px;border:1px solid var(--line);border-radius:16px;padding:10px 12px;font-size:14px;background:#fff;color:var(--text);width:100%}
    .field textarea{min-height:88px;resize:vertical}
    .field input:disabled,.field select:disabled,.field textarea:disabled{background:#f1f5f9}
    .member-card{padding:16px;border:1px solid #e5e7eb;border-radius:22px;background:#f8fafc}
    .btns{display:flex;flex-wrap:wrap;gap:10px}
    .btn{border:1px solid var(--line);border-radius:16px;padding:11px 16px;background:#fff;font-size:14px;font-weight:800;cursor:pointer}
    .btn.primary{background:var(--dark);color:#fff;border-color:var(--dark)}
    .btn.danger{border-color:#fca5a5;color:#b91c1c}
    .btn.sky{border-color:#93c5fd;color:#0369a1}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:12px 14px;border-top:1px solid #e5e7eb;text-align:left;vertical-align:top}
    thead th{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#64748b;background:#f8fafc;border-top:none}
    .table-wrap{overflow:auto;border:1px solid #e5e7eb;border-radius:22px;background:#fff}
    .years{display:flex;flex-wrap:wrap;gap:8px}
    .year-btn{padding:9px 13px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:13px;font-weight:800;cursor:pointer}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;justify-content:center;align-items:flex-start;padding:18px;overflow:auto}
    .modal{width:min(100%,1000px);background:#fff;border-radius:28px;box-shadow:0 20px 40px rgba(0,0,0,.18);overflow:hidden}
    .modal-h{padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;gap:12px}
    .receipt-body{padding:24px;max-width:900px;margin:0 auto}
    .receipt-grid{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:20px;overflow:hidden}
    .rrow{display:grid;grid-template-columns:220px 1fr;padding:11px 14px;border-bottom:1px solid #e5e7eb;font-size:14px}
    .rrow > div:first-child{font-weight:800;color:#334155}
    .rcol:first-child{border-right:1px solid #e5e7eb}
    .muted{color:#64748b}
    .section-links{display:flex;flex-wrap:wrap;gap:8px}
    .section-link{padding:10px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:13px;font-weight:800;cursor:pointer}
    .section-link.active{background:var(--dark);color:#fff;border-color:var(--dark)}
    .small{font-size:12px}
    .footnote{font-size:13px;color:#64748b}
    @media (max-width:1200px){.tabs,.stats,.row6,.row5,.row4{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:700px){.tabs,.stats,.row6,.row5,.row4,.receipt-grid{grid-template-columns:1fr}.rcol:first-child{border-right:none}.rrow{grid-template-columns:140px 1fr}}
    @media print{
      body{background:#fff}.wrap{padding:0}.no-print{display:none !important}.modal-backdrop{position:static;background:#fff;padding:0}.modal{box-shadow:none;border-radius:0;width:100%}.modal-h{display:none}.receipt-body{padding:20px}
    }
  </style>
</head>

  const nextStart=start+1; const nextEnd=String(parts[1]).length===2 ? String((end+1)%100).padStart(2,"0") : String(end+1); return `${nextStart}-${nextEnd}`;
}

function filteredPolicyGroups(){

function renderReceiptModal(){
  if(!ui.receiptPreview) return "";

  const rows=[
    ["Receipt No.", f["RECEIPT NO"]], ["Date", displayDate(f["RECEIPT DATE"])], ["SVKK ID", f["SVKK ID"]], ["Customer ID", f["CUSTOMER ID"]], ["Reference No.", f["REF."]], ["Policy No.", f["POLICY NO"]], ["Policy Holder Name", f["POLICY HOLDER NAME"]], ["Policy Type", f["POLICY TYPE"]], ["Category", f.CATEGORY], ["Sum Insured", `₹ ${rs(f["SUM INSURED (SI)"] || 0)}`], ["No. of Persons", f.PERSON], ["Village", f.VILLAGE], ["Area", f.AREA], ["Year", f.YEAR], ["Premium Amount", `₹ ${rs(f["PREMIUM AMOUNT"] || 0)}`], ["Amount Received", `₹ ${rs(f["AMOUNT RECEIVED"] || 0)}`], ["Date of Payment / CHQ Date", displayDate(f["DATE OF PAYMENT / CHQ DATE"])], ["Mode of Payment", f["MODE OF PAYMENT"]], ["Transaction Detail", f["TRANSACTION DETAIL"]], ["Transaction Date", displayDate(f["TRANSACTION DATE"])], ["Status", f["CHEQUE CLEARED / DISHONOURED"]], ["Remark", f.REMARK || "—"]
  ];
  const half=Math.ceil(rows.length/2), left=rows.slice(0,half), right=rows.slice(half);
  return `<div class="modal-backdrop">
    <div class="modal">
      <div class="modal-h no-print"><div style="font-size:20px;font-weight:800">Receipt Preview</div><div class="btns"><button class="btn primary" onclick="Actions.printReceipt()">Print</button><button class="btn" onclick="Actions.closeReceipt()">Close</button></div></div>

        <div style="text-align:center;margin-top:20px"><div style="display:inline-block;border:1px solid #cbd5e1;border-radius:999px;padding:10px 22px;font-size:28px;font-weight:900;letter-spacing:.18em">RECEIPT</div></div>
        <div class="receipt-grid" style="margin-top:20px">
          <div class="rcol">${left.map((row,idx)=>`<div class="rrow" style="${idx===left.length-1?'border-bottom:none':''}"><div>${escapeHtml(row[0])}</div><div>${escapeHtml(row[1] || "—")}</div></div>`).join("")}</div>
          <div class="rcol">${right.map((row,idx)=>`<div class="rrow" style="${idx===right.length-1?'border-bottom:none':''}"><div>${escapeHtml(row[0])}</div><div>${escapeHtml(row[1] || "—")}</div></div>`).join("")}</div>
        </div>

          <div><div style="border-top:2px solid #cbd5e1;padding-top:10px;font-weight:800;color:#475569">Authorized Signatory</div></div>
        </div>
      </div>
    </div>
  </div>`;
}
function render(){
  const allowed=currentAllowedTabs(); if(!allowed.some(t=>t.id===ui.activeTab)) ui.activeTab=allowed[0]?.id || "live";
  let panel="";
  if(ui.activeTab==="live") panel=renderLive();
  else if(ui.activeTab==="admin") panel=renderAdmin();
  else if(ui.activeTab==="future") panel=renderFuture();
  else if(ui.activeTab==="lookup") panel=renderLookup();
  else if(ui.activeTab==="add") panel=renderAdd();
  else if(ui.activeTab==="list") panel=renderList();
  document.getElementById("app").innerHTML = `<div class="wrap">${renderHeader()}${renderTabs()}${panel}</div>${renderReceiptModal()}`;
}
render();
